<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Chambers Office Door Display</title>
  <style>
    :root {
      --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --text:#fff; --muted:#cbd5e1;
      --accent:#38bdf8; --available:#22c55e; --out:#f97316; --lunch:#eab308;
      --meeting:#a855f7; --day:#ef4444; --training:#3b82f6; --unavailable:#94a3b8;
      --vacation:#67e8f9
    }
    * { box-sizing:border-box; }
    html, body { margin:0; width:100%; min-height:100%; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
    body { display:flex; align-items:center; justify-content:center; padding:18px; }
    .display { width:100%; max-width:1250px; min-height:92vh; background:var(--panel); border-radius:30px; padding:34px; box-shadow:0 24px 60px rgba(0,0,0,.45); display:grid; grid-template-rows:auto auto 1fr auto auto auto; gap:24px; }
    .top { display:grid; grid-template-columns:1.4fr 1fr; gap:24px; align-items:start; border-bottom:3px solid var(--panel2); padding-bottom:24px; }
    .name { font-size:clamp(2.2rem,5vw,4.5rem); line-height:1; font-weight:900; letter-spacing:-1px; }
    .role { margin-top:10px; font-size:clamp(1.2rem,2.1vw,2rem); color:var(--muted); font-weight:700; }
    .right-top { text-align:right; font-size:clamp(1.1rem,2vw,1.7rem); line-height:1.4; }
    .date { color:var(--accent); font-weight:800; }
    .phone { margin-top:10px; font-size:clamp(1.8rem,3.5vw,3.1rem); font-weight:900; }
    .status { border-radius:26px; padding:24px 30px; text-align:center; font-size:clamp(2.3rem,5vw,5rem); line-height:1; font-weight:950; text-transform:uppercase; letter-spacing:2px; border:4px solid rgba(255,255,255,.25); }
    .available { background:#052e16; border-color:var(--available); }
    .out { background:#431407; border-color:var(--out); }
    .lunch { background:#422006; border-color:var(--lunch); }
    .meeting { background:#2e1065; border-color:var(--meeting); }
    .day { background:#450a0a; border-color:var(--day); }
    .training { background:#172554; border-color:var(--training); }
    .unavailable { background:#334155; border-color:var(--unavailable); }
    .vacation { background:#164e63;  border-color:var(--vacation); }
    .chief { background:#f8fafc; border-color:#fff; color:#020617; }
    .custom { background:#082f49; border-color:var(--accent); }
    .main { display:grid; grid-template-columns:.9fr 1.35fr; gap:24px; min-height:0; }
    .card { background:#111827; border-radius:24px; padding:26px; overflow:hidden; }
    .card-title { text-transform:uppercase; letter-spacing:1.4px; color:var(--muted); font-size:clamp(.95rem,1.5vw,1.25rem); margin-bottom:16px; font-weight:800; }
    .quote { font-size:clamp(1.45rem,2.35vw,2.25rem); line-height:1.28; font-style:italic; }
    .quote-author { margin-top:18px; font-size:clamp(1rem,1.6vw,1.35rem); color:var(--muted); }
    .training-note { margin-top:24px; padding-top:20px; border-top:2px solid #334155; font-size:clamp(1.15rem,1.8vw,1.6rem); line-height:1.35; font-weight:700; }
    .schedule { white-space:pre-wrap; font-size:clamp(1.35rem,2.1vw,2.2rem); line-height:1.3; font-weight:700; }
    .current-line { color:#fff; background:rgba(56,189,248,.18); border-left:8px solid var(--accent); display:block; padding:8px 12px; margin:6px 0; border-radius:8px; }
    .message { background:var(--panel2); border-radius:20px; padding:18px 24px; font-size:clamp(1.35rem,2.2vw,2rem); text-align:center; font-weight:800; }
    .message.urgent { background:#7f1d1d; border:4px solid #ef4444; animation:pulseUrgent 1.5s infinite; }
    @keyframes pulseUrgent { 0%{opacity:1} 50%{opacity:.65} 100%{opacity:1} }
    .error-note { color:#fecaca; background:#7f1d1d; padding:10px 14px; border-radius:12px; font-weight:800; display:none; }
    .sync-note { color:#64748b; font-size:.85rem; text-align:right; }
    @media (max-width:800px) { body{padding:10px}.display{border-radius:20px;padding:22px;min-height:96vh}.top,.main{grid-template-columns:1fr}.right-top{text-align:left}.status{font-size:2.4rem} }
  </style>
</head>
<body>
  <main class="display">
    <section class="top">
      <div><div class="name">FF Chambers</div><div class="role">Fire Chief’s Liaison</div></div>
      <div class="right-top"><div class="date" id="date"></div><div class="phone">614-374-4774</div></div>
    </section>
    <section class="status available" id="statusBox">Available</section>
    <section class="main">
      <div class="card">
        <div class="card-title">Quote of the Day</div>
        <div class="quote" id="quoteText">Loading quote...</div>
        <div class="quote-author" id="quoteAuthor"></div>
        <div class="training-note" id="trainingNote">Training note loading...</div>
      </div>
      <div class="card">
        <div class="card-title">Today’s Schedule</div>
        <div class="schedule" id="schedule"></div>
      </div>
    </section>
    <section class="message" id="message">Loading door message...</section>
    <div class="error-note" id="errorNote"></div>
    <div class="sync-note" id="syncNote">Checking data.json...</div>
  </main>

  <script>
    const defaultData = {
      message: "Text or call if needed.",
      urgent: false,
      trainingNote: "Training note: Be clear, calm, and brief on the radio.",
      override: { enabled: false, status: "", message: "" },
      scheduleItems: [
        { start: "07:00", end: "09:00", status: "available", label: "Available" },
        { start: "09:00", end: "10:00", status: "meeting", label: "Meeting" },
        { start: "10:00", end: "12:00", status: "available", label: "Available" },
        { start: "12:00", end: "13:00", status: "lunch", label: "Lunch" },
        { start: "13:00", end: "15:00", status: "chief", label: "Meeting with Fire Chief" },
        { start: "15:00", end: "23:59", status: "day", label: "Out for Day" }
      ]
    };

    const knownStatuses = {
      available:{label:"Available", className:"available"}, vacation:{label:"Vacation", className:"vacation"}, 
      outofofficeforday:{label:"Out of Office for Day", className:"day"}, out:{label:"Out", className:"out"},
      lunch:{label:"Lunch", className:"lunch"}, meeting:{label:"Meeting", className:"meeting"},
      day:{label:"Out for Day", className:"day"}, "out for day":{label:"Out for Day", className:"day"},
      training:{label:"Training", className:"training"}, unavailable:{label:"Unavailable", className:"unavailable"},
      "do not disturb":{label:"Do Not Disturb", className:"day"}, dnd:{label:"Do Not Disturb", className:"day"},
      chief:{label:"Meeting with Fire Chief", className:"chief"}, "meeting with fire chief":{label:"Meeting with Fire Chief", className:"chief"},
      workout:{label:"Working Out", className:"training"}, "working out":{label:"Working Out", className:"training"}
    };

    const backupQuotes = [
      { text:"Do the next right thing.", author:"Unknown" },
      { text:"The obstacle is the way.", author:"Marcus Aurelius" },
      { text:"Waste no more time arguing what a good person should be. Be one.", author:"Marcus Aurelius" },
      { text:"You have power over your mind — not outside events. Realize this, and you will find strength.", author:"Marcus Aurelius" },
      { text:"Be useful. Be honest. Be kind.", author:"Unknown" },
      { text:"Small acts, done consistently, become identity.", author:"Unknown" },
      { text:"Discipline is choosing what you want most over what you want now.", author:"Unknown" }
    ];

    let currentData = JSON.parse(JSON.stringify(defaultData));

    function setDate() {
      const now = new Date();
      document.getElementById("date").textContent = now.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
    }

    function setBackupQuote() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      const quote = backupQuotes[dayOfYear % backupQuotes.length];
      document.getElementById("quoteText").textContent = "“" + quote.text + "”";
      document.getElementById("quoteAuthor").textContent = "— " + quote.author;
    }

    async function loadInternetQuote() {
      try {
        const response = await fetch("https://zenquotes.io/api/today");
        if (!response.ok) throw new Error("Quote service unavailable");
        const data = await response.json();
        if (!data || !data[0] || !data[0].q) throw new Error("Bad quote data");
        document.getElementById("quoteText").textContent = "“" + data[0].q + "”";
        document.getElementById("quoteAuthor").textContent = "— " + data[0].a + " | ZenQuotes";
      } catch (error) { setBackupQuote(); }
    }

    function timeToMinutes(timeString) {
      const parts = String(timeString || "").trim().split(":");
      if (parts.length !== 2) return null;
      const hours = Number(parts[0]);
      const minutes = Number(parts[1]);
      if (Number.isNaN(hours) || Number.isNaN(minutes)) return null;
      return hours * 60 + minutes;
    }

    function nowInMinutes() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }
     
     function todayKey() {
       const now = new Date();
       const year = now.getFullYear();
       const month = String(now.getMonth() + 1).padStart(2, "0");
       const day = String(now.getDate()).padStart(2, "0");

       return `${year}-${month}-${day}`;
     }

     function isWeekend() {
       const day = new Date().getDay();
       return day === 0 || day === 6;
     }

     function isDataStale(data) {
       if (!data.displayDate) return false;
       if (isWeekend()) return false;

       const staleAfter = data.staleAfter || "10:00";
       const staleMinutes = timeToMinutes(staleAfter);

       if (staleMinutes === null) return false;

       const dateIsOld = data.displayDate !== todayKey();
       const itIsAfterStaleTime = nowInMinutes() >= staleMinutes;

       return dateIsOld && itIsAfterStaleTime;
     }
    
     function normalizeStatus(statusValue) {
       return String(statusValue || "available")
            .trim()
            .toLowerCase()
            .replaceAll(" ", "")
            .replaceAll("-", "");
     }

    function applyStatus(statusValue) {
      const statusBox = document.getElementById("statusBox");
      const normalized = normalizeStatus(statusValue);
      const known = knownStatuses[normalized];

      if (known) {
        statusBox.className = "status " + known.className;
        statusBox.textContent = known.label;
      } else {
        statusBox.className = "status custom";
        statusBox.textContent = String(statusValue || "Available").trim();
      }
    }

    function findCurrentScheduleItem(scheduleItems) {
      const now = nowInMinutes();
      if (!Array.isArray(scheduleItems)) return null;
      return scheduleItems.find(item => {
        const start = timeToMinutes(item.start);
        const end = timeToMinutes(item.end);
        if (start === null || end === null) return false;
        return now >= start && now < end;
      }) || null;
    }

    function escapeHtml(text) {
      return String(text).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function buildScheduleHtml(scheduleItems, currentItem) {
      if (!Array.isArray(scheduleItems)) return "";
      return scheduleItems.map(item => {
        const label = item.label || item.status || "";
        const line = `${item.start} - ${item.end}  ${label}`;
        const isCurrent = currentItem && item.start === currentItem.start && item.end === currentItem.end && label === (currentItem.label || currentItem.status || "");
        return isCurrent ? `<span class="current-line">${escapeHtml(line)}</span>` : escapeHtml(line);
      }).join("\n");
    }

    function applyData(data) {
      const merged = {
        ...defaultData,
        ...data,
        override: { ...defaultData.override, ...(data.override || {}) }
      };

      currentData = merged;
      
      const currentItem = findCurrentScheduleItem(merged.scheduleItems);
      const overrideEnabled = merged.override && merged.override.enabled === true;
      const staleEnabled = isDataStale(merged);

      if (overrideEnabled) {
           applyStatus(merged.override.status || "unavailable");
      } else if (staleEnabled) {
           applyStatus(merged.staleStatus || "outOfOfficeForDay");
      } else if (currentItem) {
           applyStatus(currentItem.status || currentItem.label || "unavailable");
      } else {
           applyStatus("out");
      }

      if (staleEnabled && !overrideEnabled) {
           document.getElementById("schedule").innerHTML =
                `<span class="current-line">${escapeHtml(merged.staleSchedule || "07:00 - 15:00  Out of Office")}</span>`;
      } else {
           document.getElementById("schedule").innerHTML =
                buildScheduleHtml(merged.scheduleItems, currentItem);
      }

     const messageText =
          overrideEnabled && merged.override.message
               ? merged.override.message
               : staleEnabled && merged.staleMessage
               ? merged.staleMessage
               : merged.message || defaultData.message;
      const messageBox = document.getElementById("message");
      messageBox.textContent = messageText;
      if (merged.urgent === true) messageBox.classList.add("urgent");
      else messageBox.classList.remove("urgent");

      document.getElementById("trainingNote").textContent = merged.trainingNote || defaultData.trainingNote;
    }

    async function loadDoorData() {
      try {
        const response = await fetch("data.json?cacheBust=" + Date.now());
        if (!response.ok) throw new Error("Could not load data.json");
        const data = await response.json();
        document.getElementById("errorNote").style.display = "none";
        applyData(data);
        const time = new Date().toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
        document.getElementById("syncNote").textContent = "Updated from data.json at " + time;
      } catch (error) {
        document.getElementById("errorNote").style.display = "block";
        document.getElementById("errorNote").textContent = "Could not read data.json. Check commas, quotes, and brackets.";
        applyData(currentData || defaultData);
        document.getElementById("syncNote").textContent = "Using last good data.";
      }
    }

    setDate();
    applyData(defaultData);
    loadDoorData();
    loadInternetQuote();

    setInterval(setDate, 60 * 1000);
    setInterval(loadInternetQuote, 6 * 60 * 60 * 1000);
    setInterval(loadDoorData, 30 * 1000);
    setInterval(() => applyData(currentData), 60 * 1000);
    setInterval(() => location.reload(), 4 * 60 * 60 * 1000);
  </script>
</body>
</html>
