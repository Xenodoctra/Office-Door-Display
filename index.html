<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FF Chambers Office Door Display</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel2: #334155;
      --text: #ffffff;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --available: #22c55e;
      --out: #f97316;
      --lunch: #eab308;
      --meeting: #a855f7;
      --day: #ef4444;
      --custom: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .display {
      width: 100%;
      max-width: 1250px;
      min-height: 92vh;
      background: var(--panel);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 24px;
      position: relative;
    }

    .top {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 24px;
      align-items: start;
      border-bottom: 3px solid var(--panel2);
      padding-bottom: 24px;
    }

    .name {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .role {
      margin-top: 10px;
      font-size: clamp(1.2rem, 2.1vw, 2rem);
      color: var(--muted);
      font-weight: 700;
    }

    .right-top {
      text-align: right;
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      line-height: 1.4;
    }

    .date {
      color: var(--accent);
      font-weight: 800;
    }

    .phone {
      margin-top: 10px;
      font-size: clamp(1.8rem, 3.5vw, 3.1rem);
      font-weight: 900;
    }

    .status {
      border-radius: 26px;
      padding: 24px 30px;
      text-align: center;
      font-size: clamp(2.3rem, 5vw, 5rem);
      line-height: 1;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 4px solid rgba(255,255,255,0.25);
    }

    .status.available {
      background: #052e16;
      border-color: var(--available);
    }

    .status.out {
      background: #431407;
      border-color: var(--out);
    }

    .status.lunch {
      background: #422006;
      border-color: var(--lunch);
    }

    .status.meeting {
      background: #2e1065;
      border-color: var(--meeting);
    }

    .status.day {
      background: #450a0a;
      border-color: var(--day);
    }

    .status.custom {
      background: #082f49;
      border-color: var(--custom);
    }

    .main {
      display: grid;
      grid-template-columns: 0.9fr 1.35fr;
      gap: 24px;
      min-height: 0;
    }

    .card {
      background: #111827;
      border-radius: 24px;
      padding: 26px;
      overflow: hidden;
    }

    .card-title {
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.5vw, 1.25rem);
      margin-bottom: 16px;
      font-weight: 800;
    }

    .quote {
      font-size: clamp(1.55rem, 2.5vw, 2.45rem);
      line-height: 1.28;
      font-style: italic;
    }

    .quote-author {
      margin-top: 18px;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      color: var(--muted);
    }

    .schedule {
      white-space: pre-wrap;
      font-size: clamp(1.55rem, 2.5vw, 2.65rem);
      line-height: 1.28;
      font-weight: 700;
    }

    .message {
      background: var(--panel2);
      border-radius: 20px;
      padding: 18px 24px;
      font-size: clamp(1.35rem, 2.2vw, 2rem);
      text-align: center;
      font-weight: 800;
    }

    .sync-note {
      color: #64748b;
      font-size: 0.85rem;
      text-align: right;
      padding-right: 72px;
    }

    .admin-button {
      position: fixed;
      right: 14px;
      bottom: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.18);
      font-size: 0.8rem;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      z-index: 10;
      cursor: pointer;
    }

    .admin-button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.5);
    }

    .editor {
      display: none;
      background: #020617;
      border: 2px solid var(--panel2);
      border-radius: 24px;
      padding: 22px;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    label {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      font-size: 1.15rem;
      padding: 13px;
      border-radius: 12px;
      border: none;
      margin-bottom: 14px;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
      font-family: Arial, Helvetica, sans-serif;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      font-size: 1.1rem;
      padding: 13px 20px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #082f49;
      font-weight: 900;
      cursor: pointer;
    }

    button.secondary {
      background: #64748b;
      color: white;
    }

    @media (max-width: 800px) {
      body {
        padding: 10px;
      }

      .display {
        border-radius: 20px;
        padding: 22px;
        min-height: 96vh;
      }

      .top,
      .main,
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .right-top {
        text-align: left;
      }

      .status {
        font-size: 2.4rem;
      }
    }
  </style>
</head>

<body>
  <main class="display">
    <section class="top">
      <div>
        <div class="name">FF Chambers</div>
        <div class="role">Fire Chief’s Liaison</div>
      </div>

      <div class="right-top">
        <div class="date" id="date"></div>
        <div class="phone">614-374-4774</div>
      </div>
    </section>

    <section class="status available" id="statusBox">Available</section>

    <section class="main">
      <div class="card">
        <div class="card-title">Quote of the Day</div>
        <div class="quote" id="quoteText">Loading quote...</div>
        <div class="quote-author" id="quoteAuthor"></div>
      </div>

      <div class="card">
        <div class="card-title">Today’s Schedule</div>
        <div class="schedule" id="schedule"></div>
      </div>
    </section>

    <section class="message" id="message">
      Loading door message...
    </section>

    <section class="editor" id="editor">
      <div class="editor-grid">
        <div>
          <label for="statusInput">Status</label>
          <input id="statusInput" type="text" placeholder="Example: available, meeting, Working Out" />

          <label for="messageInput">Optional Message</label>
          <input id="messageInput" type="text" placeholder="Example: Back at 1300. Text if urgent." />
        </div>

        <div>
          <label for="scheduleInput">Today’s Schedule</label>
          <textarea id="scheduleInput"></textarea>
        </div>
      </div>

      <div class="button-row">
        <button onclick="downloadJson()">Download updated data.json</button>
        <button class="secondary" onclick="hideEditor()">Cancel</button>
      </div>
    </section>

    <div class="sync-note" id="syncNote">Checking data.json...</div>
  </main>

  <button class="admin-button" onclick="openAdmin()">Admin</button>

  <script>
    const ADMIN_CODE = "4774";

    const defaultData = {
      status: "available",
      schedule: "0800 - Available\n0900 - Office / Project Work\n1100 - Meeting / Admin\n1200 - Lunch\n1300 - Available\n1530 - Out",
      message: "If I am away from the office, please text or call."
    };

    const knownStatuses = {
      available: { label: "Available", className: "available" },
      out: { label: "Out", className: "out" },
      lunch: { label: "Lunch", className: "lunch" },
      meeting: { label: "Meeting", className: "meeting" },
      day: { label: "Out for Day", className: "day" },
      "out for day": { label: "Out for Day", className: "day" }
    };

    const backupQuotes = [
      { text: "Do the next right thing.", author: "Unknown" },
      { text: "The obstacle is the way.", author: "Marcus Aurelius" },
      { text: "Waste no more time arguing what a good person should be. Be one.", author: "Marcus Aurelius" },
      { text: "You have power over your mind — not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
      { text: "Be useful. Be honest. Be kind.", author: "Unknown" },
      { text: "Small acts, done consistently, become identity.", author: "Unknown" },
      { text: "Discipline is choosing what you want most over what you want now.", author: "Unknown" }
    ];

    let currentData = { ...defaultData };

    function setDate() {
      const now = new Date();

      document.getElementById("date").textContent = now.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function setBackupQuote() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      const quote = backupQuotes[dayOfYear % backupQuotes.length];

      document.getElementById("quoteText").textContent = "“" + quote.text + "”";
      document.getElementById("quoteAuthor").textContent = "— " + quote.author;
    }

    async function loadInternetQuote() {
      try {
        const response = await fetch("https://zenquotes.io/api/today");
        if (!response.ok) throw new Error("Quote service unavailable");

        const data = await response.json();
        if (!data || !data[0] || !data[0].q) throw new Error("Bad quote data");

        document.getElementById("quoteText").textContent = "“" + data[0].q + "”";
        document.getElementById("quoteAuthor").textContent = "— " + data[0].a + " | ZenQuotes";
      } catch (error) {
        setBackupQuote();
      }
    }

    function normalizeStatus(statusValue) {
      return String(statusValue || "available").trim().toLowerCase();
    }

    function applyStatus(statusValue) {
      const statusBox = document.getElementById("statusBox");
      const normalized = normalizeStatus(statusValue);
      const known = knownStatuses[normalized];

      if (known) {
        statusBox.className = "status " + known.className;
        statusBox.textContent = known.label;
      } else {
        statusBox.className = "status custom";
        statusBox.textContent = String(statusValue || "Available").trim();
      }
    }

    function applyData(data) {
      currentData = {
        status: data.status || defaultData.status,
        schedule: data.schedule || defaultData.schedule,
        message: data.message || defaultData.message
      };

      applyStatus(currentData.status);

      document.getElementById("schedule").textContent = currentData.schedule;
      document.getElementById("message").textContent = currentData.message;

      document.getElementById("statusInput").value = currentData.status;
      document.getElementById("scheduleInput").value = currentData.schedule;
      document.getElementById("messageInput").value = currentData.message;
    }

    async function loadDoorData() {
      try {
        const response = await fetch("data.json?cacheBust=" + Date.now());

        if (!response.ok) {
          throw new Error("Could not load data.json");
        }

        const data = await response.json();
        applyData(data);

        const time = new Date().toLocaleTimeString("en-US", {
          hour: "numeric",
          minute: "2-digit"
        });

        document.getElementById("syncNote").textContent = "Updated from data.json at " + time;
      } catch (error) {
        applyData(currentData.status ? currentData : defaultData);
        document.getElementById("syncNote").textContent = "Using saved/default data. Could not read data.json.";
      }
    }

    function hideEditor() {
      document.getElementById("editor").style.display = "none";
    }

    function showEditor() {
      document.getElementById("editor").style.display = "block";
      document.getElementById("statusInput").focus();
      document.getElementById("editor").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function openAdmin() {
      const enteredCode = prompt("Enter admin code:");

      if (enteredCode === ADMIN_CODE) {
        showEditor();
      } else if (enteredCode !== null) {
        alert("Incorrect code.");
      }
    }

    function downloadJson() {
      const updatedData = {
        status: document.getElementById("statusInput").value,
        schedule: document.getElementById("scheduleInput").value,
        message: document.getElementById("messageInput").value
      };

      const jsonText = JSON.stringify(updatedData, null, 2);
      const blob = new Blob([jsonText], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "data.json";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);

      alert("Downloaded data.json. Upload or paste this into GitHub to update the iPad.");
    }

    setDate();
    applyData(defaultData);
    loadDoorData();
    loadInternetQuote();

    setInterval(setDate, 60 * 1000);
    setInterval(loadInternetQuote, 6 * 60 * 60 * 1000);
    setInterval(loadDoorData, 30 * 1000);
  </script>
</body>
</html>
