<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FF Chambers Office Door Display</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel2: #334155;
      --text: #ffffff;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --available: #22c55e;
      --out: #f97316;
      --lunch: #eab308;
      --meeting: #a855f7;
      --day: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .display {
      width: 100%;
      max-width: 1250px;
      min-height: 92vh;
      background: var(--panel);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 24px;
      position: relative;
    }

    .top {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 24px;
      align-items: start;
      border-bottom: 3px solid var(--panel2);
      padding-bottom: 24px;
    }

    .name {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .role {
      margin-top: 10px;
      font-size: clamp(1.2rem, 2.1vw, 2rem);
      color: var(--muted);
      font-weight: 700;
    }

    .right-top {
      text-align: right;
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      line-height: 1.4;
    }

    .date {
      color: var(--accent);
      font-weight: 800;
    }

    .phone {
      margin-top: 10px;
      font-size: clamp(1.8rem, 3.5vw, 3.1rem);
      font-weight: 900;
    }

    .status {
      border-radius: 26px;
      padding: 24px 30px;
      text-align: center;
      font-size: clamp(2.3rem, 5vw, 5rem);
      line-height: 1;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 4px solid rgba(255,255,255,0.25);
    }

    .status.available {
      background: #052e16;
      border-color: var(--available);
    }

    .status.out {
      background: #431407;
      border-color: var(--out);
    }

    .status.lunch {
      background: #422006;
      border-color: var(--lunch);
    }

    .status.meeting {
      background: #2e1065;
      border-color: var(--meeting);
    }

    .status.day {
      background: #450a0a;
      border-color: var(--day);
    }

    .main {
      display: grid;
      grid-template-columns: 0.9fr 1.35fr;
      gap: 24px;
      min-height: 0;
    }

    .card {
      background: #111827;
      border-radius: 24px;
      padding: 26px;
      overflow: hidden;
    }

    .card-title {
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.5vw, 1.25rem);
      margin-bottom: 16px;
      font-weight: 800;
    }

    .quote {
      font-size: clamp(1.55rem, 2.5vw, 2.45rem);
      line-height: 1.28;
      font-style: italic;
    }

    .quote-author {
      margin-top: 18px;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      color: var(--muted);
    }

    .schedule {
      white-space: pre-wrap;
      font-size: clamp(1.55rem, 2.5vw, 2.65rem);
      line-height: 1.28;
      font-weight: 700;
    }

    .message {
      background: var(--panel2);
      border-radius: 20px;
      padding: 18px 24px;
      font-size: clamp(1.35rem, 2.2vw, 2rem);
      text-align: center;
      font-weight: 800;
    }

    .editor {
      display: none;
      background: #020617;
      border: 2px solid var(--panel2);
      border-radius: 24px;
      padding: 22px;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    label {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    select,
    input,
    textarea {
      width: 100%;
      font-size: 1.15rem;
      padding: 13px;
      border-radius: 12px;
      border: none;
      margin-bottom: 14px;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
      font-family: Arial, Helvetica, sans-serif;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      font-size: 1.1rem;
      padding: 13px 20px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #082f49;
      font-weight: 900;
      cursor: pointer;
    }

    button.secondary {
      background: #64748b;
      color: white;
    }

    .admin-button {
      position: fixed;
      right: 14px;
      bottom: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.18);
      font-size: 0.8rem;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      z-index: 10;
    }

    .admin-button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.5);
    }

    .footer {
      color: #64748b;
      font-size: 0.85rem;
      text-align: right;
      padding-right: 72px;
    }

    @media (max-width: 800px) {
      body {
        padding: 10px;
      }

      .display {
        border-radius: 20px;
        padding: 22px;
        min-height: 96vh;
      }

      .top,
      .main,
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .right-top {
        text-align: left;
      }

      .status {
        font-size: 2.4rem;
      }
    }
  </style>
</head>

<body>
  <main class="display">
    <section class="top">
      <div>
        <div class="name">FF Chambers</div>
        <div class="role">Fire Chief’s Liaison</div>
      </div>

      <div class="right-top">
        <div class="date" id="date"></div>
        <div class="phone">614-374-4774</div>
      </div>
    </section>

    <section class="status available" id="statusBox">Available</section>

    <section class="main">
      <div class="card">
        <div class="card-title">Quote of the Day</div>
        <div class="quote" id="quoteText">Loading quote...</div>
        <div class="quote-author" id="quoteAuthor"></div>
      </div>

      <div class="card">
        <div class="card-title">Today’s Schedule</div>
        <div class="schedule" id="schedule"></div>
      </div>
    </section>

    <section class="message" id="message">
      If I am away from the office, please text or call.
    </section>

    <section class="editor" id="editor">
      <div class="editor-grid">
        <div>
          <label for="statusInput">Status</label>
          <select id="statusInput">
            <option value="available">Available</option>
            <option value="out">Out</option>
            <option value="lunch">Lunch</option>
            <option value="meeting">Meeting</option>
            <option value="day">Out for Day</option>
          </select>

          <label for="messageInput">Optional Message</label>
          <input id="messageInput" type="text" placeholder="Example: Back at 1300. Text if urgent." />
        </div>

        <div>
          <label for="scheduleInput">Today’s Schedule</label>
          <textarea id="scheduleInput"></textarea>
        </div>
      </div>

      <div class="button-row">
        <button onclick="saveDisplay()">Save</button>
        <button class="secondary" onclick="hideEditor()">Cancel</button>
        <button class="secondary" onclick="resetDisplay()">Reset</button>
      </div>
    </section>

    <div class="footer">Use Admin button to edit.</div>
  </main>

  <button class="admin-button" onclick="openAdmin()">Admin</button>

  <script>
    const ADMIN_CODE = "4774";

    const defaultSchedule =
`0800 - Available
0900 - Office / Project Work
1100 - Meeting / Admin
1200 - Lunch
1300 - Available
1530 - Out`;

    const defaultMessage = "If I am away from the office, please text or call.";

    const statusLabels = {
      available: "Available",
      out: "Out",
      lunch: "Lunch",
      meeting: "Meeting",
      day: "Out for Day"
    };

    const backupQuotes = [
      { text: "Do the next right thing.", author: "Unknown" },
      { text: "The obstacle is the way.", author: "Marcus Aurelius" },
      { text: "Waste no more time arguing what a good person should be. Be one.", author: "Marcus Aurelius" },
      { text: "You have power over your mind — not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
      { text: "Be useful. Be honest. Be kind.", author: "Unknown" },
      { text: "Small acts, done consistently, become identity.", author: "Unknown" },
      { text: "Discipline is choosing what you want most over what you want now.", author: "Unknown" }
    ];

    function setDate() {
      const now = new Date();

      document.getElementById("date").textContent = now.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function setBackupQuote() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      const quote = backupQuotes[dayOfYear % backupQuotes.length];

      document.getElementById("quoteText").textContent = "“" + quote.text + "”";
      document.getElementById("quoteAuthor").textContent = "— " + quote.author;
    }

    async function loadInternetQuote() {
      try {
        const response = await fetch("https://zenquotes.io/api/today");
        if (!response.ok) throw new Error("Quote service unavailable");

        const data = await response.json();
        if (!data || !data[0] || !data[0].q) throw new Error("Bad quote data");

        document.getElementById("quoteText").textContent = "“" + data[0].q + "”";
        document.getElementById("quoteAuthor").textContent = "— " + data[0].a + " | ZenQuotes";
      } catch (error) {
        setBackupQuote();
      }
    }

    function applyStatus(statusValue) {
      const statusBox = document.getElementById("statusBox");
      statusBox.className = "status " + statusValue;
      statusBox.textContent = statusLabels[statusValue] || "Available";
    }

    function loadDisplay() {
      const savedStatus = localStorage.getItem("doorStatus") || "available";
      const savedSchedule = localStorage.getItem("doorSchedule") || defaultSchedule;
      const savedMessage = localStorage.getItem("doorMessage") || defaultMessage;

      applyStatus(savedStatus);

      document.getElementById("schedule").textContent = savedSchedule;
      document.getElementById("message").textContent = savedMessage;

      document.getElementById("statusInput").value = savedStatus;
      document.getElementById("scheduleInput").value = savedSchedule;
      document.getElementById("messageInput").value = savedMessage;
    }

    function saveDisplay() {
      const statusValue = document.getElementById("statusInput").value;
      const scheduleValue = document.getElementById("scheduleInput").value;
      const messageValue = document.getElementById("messageInput").value || defaultMessage;

      localStorage.setItem("doorStatus", statusValue);
      localStorage.setItem("doorSchedule", scheduleValue);
      localStorage.setItem("doorMessage", messageValue);

      loadDisplay();
      hideEditor();
    }

    function hideEditor() {
      document.getElementById("editor").style.display = "none";
    }

    function showEditor() {
      document.getElementById("editor").style.display = "block";
      document.getElementById("scheduleInput").focus();
      document.getElementById("editor").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function resetDisplay() {
      const confirmReset = confirm("Reset status, schedule, and message to defaults?");
      if (!confirmReset) return;

      localStorage.removeItem("doorStatus");
      localStorage.removeItem("doorSchedule");
      localStorage.removeItem("doorMessage");
      loadDisplay();
    }

    function openAdmin() {
      const enteredCode = prompt("Enter admin code:");

      if (enteredCode === ADMIN_CODE) {
        showEditor();
      } else if (enteredCode !== null) {
        alert("Incorrect code.");
      }
    }

    setDate();
    loadDisplay();
    loadInternetQuote();

    setInterval(setDate, 60 * 1000);
    setInterval(loadInternetQuote, 6 * 60 * 60 * 1000);
  </script>
</body>
</html>
